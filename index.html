<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Para o amor da minha vida ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

overflow:hidden;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ff9a9e,#fad0c4);

}

#inicio,#conteudo{

position:absolute;

text-align:center;

}

button{

padding:18px 40px;

font-size:22px;

border:none;

border-radius:50px;

cursor:pointer;

background:#ff4d6d;

color:white;

transition:.3s;

}

button:hover{

transform:scale(1.1);

}

#conteudo{

display:none;

animation:aparece 1s;

}

@keyframes aparece{

from{

opacity:0;

transform:scale(.8);

}

to{

opacity:1;

transform:scale(1);

}

}

h1{

color:white;

font-size:50px;

margin-bottom:15px;

text-shadow:2px 2px 10px black;

}

p{

color:white;

font-size:22px;

margin-bottom:20px;

}

img{

width:320px;

height:420px;

object-fit:cover;

border-radius:25px;

box-shadow:0 0 20px rgba(0,0,0,.4);

}

.setas{

margin-top:20px;

}

.setas button{

margin:10px;

font-size:28px;

padding:10px 20px;

}

.heart{

position:absolute;

color:red;

font-size:25px;

animation:cair linear infinite;

}

@keyframes cair{

0%{

transform:translateY(-100px);

opacity:1;

}

100%{

transform:translateY(110vh);

opacity:0;

}

}

</style>

</head>

<body>

<div id="inicio">

<h1>Tenho uma surpresa ❤️</h1>

<br>

<button onclick="abrir()">

Clique aqui meu amor

</button>

</div>

<div id="conteudo">

<h1>Eu te amo ❤️</h1>

<p>

Obrigado por fazer meus dias mais felizes.<br>

Você é meu porto seguro.<br><br>

Te escolheria mil vezes.

</p>

<img id="foto" src="foto1.jpeg">

<div class="setas">

<button onclick="voltar()">⬅</button>

<button onclick="proxima()">➡</button>

</div>

<br>

<p id="contador"></p>

</div>

<script>

function abrir(){

document.getElementById("inicio").style.display="none";

document.getElementById("conteudo").style.display="block";

}

let fotos=[

"foto1.jpeg",

"foto2.jpeg",

"foto3.jpeg",

"foto4.jpeg"

];

let atual=0;

function proxima(){

atual++;

if(atual>=fotos.length){

atual=0;

}

document.getElementById("foto").src=fotos[atual];

}

function voltar(){

atual--;

if(atual<0){

atual=fotos.length-1;

}

document.getElementById("foto").src=fotos[atual];

}

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*30)+"px";

heart.style.animationDuration=(4+Math.random()*5)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},9000);

},180);

let numero=0;

setInterval(()=>{

numero++;

document.getElementById("contador").innerHTML=

"Já pensei em você ❤️ "+numero+" vezes desde que abriu esta página.";

},120);

</script>

</body>
</html>
